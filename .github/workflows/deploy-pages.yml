name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout SimpleGraphics
        uses: actions/checkout@v4
        with:
          repository: academia-de-codigo/simple-graphics
          path: simple-graphics

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build SimpleGraphics
        run: mvn install -f simple-graphics/pom.xml -DskipTests

      - name: Build Painter
        run: mvn install -f pom.xml -DskipTests

      - name: Copy JAR to docs
        run: cp target/painter-1.0-SNAPSHOT-jar-with-dependencies.jar docs/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
