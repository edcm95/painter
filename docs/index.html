<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painter</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: #ccc;
        }
        #loading {
            text-align: center;
        }
        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #4caf50;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading .hint {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
        }
        #canvas-wrapper {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading Painter…</div>
        <div class="hint">First load takes a while — CheerpJ is downloading a Java runtime.</div>
    </div>
    <div id="canvas-wrapper"></div>

    <script>
        cheerpjInit({
            enableInput: true,
            canvas: {
                width: 1220,
                height: 920
            }
        }).then(function () {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('canvas-wrapper').style.display = 'block';
            return cheerpjRunJar("painter-1.0-SNAPSHOT-jar-with-dependencies.jar");
        }).catch(function (err) {
            document.getElementById('loading').innerHTML =
                '<div style="color: #f44; font-size: 18px;">Failed to load Painter</div>' +
                '<pre style="font-size: 12px; color: #aaa;">' + err + '</pre>';
        });
    </script>
</body>
</html>
